<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #ui-container {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .score-section {
            font-size: 18px;
        }

        .label {
            opacity: 0.8;
            margin-right: 5px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #4ade80;
            color: #1e3c72;
            font-weight: bold;
        }

        .pause-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #game-canvas {
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .mobile-controls {
            display: none;
            margin-top: 15px;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: #4ade80;
            transform: scale(0.95);
        }

        .menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 60, 114, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .menu.hidden {
            display: none;
        }

        .menu h2 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        .final-score {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px 30px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            background: #4ade80;
            color: #1e3c72;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        .revive-btn {
            background: #f59e0b;
            color: #1e3c72;
        }

        .revive-btn:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        .leaderboard-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(251, 191, 36, 0.3);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .leaderboard-btn:hover {
            background: rgba(251, 191, 36, 0.5);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 8px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .leaderboard-table th {
            font-size: 14px;
            opacity: 0.7;
            font-weight: normal;
        }

        .leaderboard-table td {
            font-size: 16px;
        }

        .rank-badge {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 13px;
        }

        .rank-1 { background: #ffd700; color: #1e3c72; }
        .rank-2 { background: #c0c0c0; color: #1e3c72; }
        .rank-3 { background: #cd7f32; color: #1e3c72; }
        .rank-other { background: rgba(255,255,255,0.1); color: white; }

        .current-score-row td {
            background: rgba(74, 222, 128, 0.2);
            font-weight: bold;
        }

        .no-scores {
            opacity: 0.6;
            padding: 20px;
            font-size: 16px;
        }

        .share-btn {
            display: inline-block;
            padding: 8px 16px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            background: transparent;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .share-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: block;
            }

            .info-bar {
                font-size: 14px;
                gap: 15px;
            }

            .difficulty-selector {
                gap: 5px;
            }

            .difficulty-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .menu {
                padding: 24px 20px;
                max-width: 85vw;
                max-height: 80vh;
                overflow-y: auto;
            }

            .menu h2 {
                font-size: 24px;
                margin-bottom: 14px;
                white-space: nowrap;
            }

            .menu-btn {
                font-size: 15px;
                padding: 10px 20px;
            }

            .final-score {
                font-size: 17px;
                margin-bottom: 18px;
            }
        }

        @media (max-width: 380px) {
            .menu {
                padding: 18px 14px;
                max-width: 90vw;
            }

            .menu h2 {
                font-size: 20px;
            }

            .menu-btn {
                font-size: 14px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="info-bar">
            <div class="score-section">
                <span class="label">分数:</span>
                <span id="score">0</span>
            </div>
            <div class="score-section">
                <span class="label">最高分:</span>
                <span id="highscore">0</span>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn" data-speed="600">慢速</button>
            <button class="difficulty-btn active" data-speed="400">中速</button>
            <button class="difficulty-btn" data-speed="240">快速</button>
        </div>

        <button id="pause-btn" class="pause-btn">暂停</button>
        <button id="leaderboard-btn" class="leaderboard-btn">🏆 排行榜</button>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <canvas id="game-canvas"></canvas>

    <div id="mobile-controls" class="mobile-controls">
        <div class="control-row">
            <button class="control-btn" id="btn-up">↑</button>
        </div>
        <div class="control-row">
            <button class="control-btn" id="btn-left">←</button>
            <button class="control-btn" id="btn-down">↓</button>
            <button class="control-btn" id="btn-right">→</button>
        </div>
    </div>

    <div id="pause-menu" class="menu hidden">
        <h2>游戏暂停</h2>
        <button id="resume-btn" class="menu-btn">继续游戏</button>
        <button id="restart-btn" class="menu-btn">重新开始</button>
    </div>

    <div id="game-over-menu" class="menu hidden">
        <h2>游戏结束</h2>
        <p class="final-score">最终得分: <span id="final-score">0</span></p>
        <div id="new-record" style="color:#ffd700;font-size:16px;margin-bottom:15px;display:none;">🎉 新纪录！</div>
        <button id="revive-btn" class="menu-btn revive-btn">💪 复活一次</button>
        <button id="share-score-btn" class="share-btn" style="margin-bottom:15px;">📤 分享成绩</button>
        <button id="play-again-btn" class="menu-btn">再玩一次</button>
    </div>

    <!-- 排行榜 -->
    <div id="leaderboard-menu" class="menu hidden">
        <h2>🏆 排行榜</h2>
        <div id="leaderboard-content">
            <div class="no-scores">暂无记录</div>
        </div>
        <button id="leaderboard-close-btn" class="menu-btn">关闭</button>
    </div>

    <script>
        // 游戏常量
        const GAME_CONFIG = {
            GRID_SIZE: 20,
            SNAKE_COLOR: '#4ade80',
            SNAKE_BODY_COLOR: '#22c55e',
            FOOD_COLOR: '#f97316',
            BACKGROUND_COLOR: '#1e3c72',
            GRID_COLOR: 'rgba(255, 255, 255, 0.05)',
            SHADOW_COLOR: 'rgba(0, 0, 0, 0.3)'
        };

        // 游戏状态枚举
        const GameState = {
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover'
        };

        // 难度配置
        const DIFFICULTIES = {
            slow: 600,
            medium: 400,
            fast: 240
        };

        // Snake 类 - 管理蛇的状态和移动
        class Snake {
            constructor(startX, startY) {
                this.body = [
                    { x: startX, y: startY },
                    { x: startX - 1, y: startY },
                    { x: startX - 2, y: startY }
                ];
                this.direction = { x: 1, y: 0 }; // 初始向右移动
                this.nextDirection = { x: 1, y: 0 };
                this.growing = false;
            }

            // 设置方向（防止直接掉头）
            setDirection(x, y) {
                // 防止直接掉头
                if (this.direction.x === -x && this.direction.y === -y) {
                    return;
                }
                this.nextDirection = { x, y };
            }

            // 移动蛇
            move() {
                this.direction = { ...this.nextDirection };

                const head = this.getHead();
                const newHead = {
                    x: head.x + this.direction.x,
                    y: head.y + this.direction.y
                };

                this.body.unshift(newHead);

                if (!this.growing) {
                    this.body.pop();
                } else {
                    this.growing = false;
                }
            }

            // 获取蛇头
            getHead() {
                return this.body[0];
            }

            // 检查是否撞到自己
            collidesWithSelf() {
                const head = this.getHead();
                return this.body.slice(1).some(segment =>
                    segment.x === head.x && segment.y === head.y
                );
            }

            // 生长
            grow() {
                this.growing = true;
            }

            // 重置
            reset(startX, startY) {
                this.body = [
                    { x: startX, y: startY },
                    { x: startX - 1, y: startY },
                    { x: startX - 2, y: startY }
                ];
                this.direction = { x: 1, y: 0 };
                this.nextDirection = { x: 1, y: 0 };
                this.growing = false;
            }
        }

        // Game 类 - 管理游戏循环和状态
        class Game {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.gridSize = GAME_CONFIG.GRID_SIZE;

                // 计算网格数量
                this.resizeCanvas();
                this.gridWidth = Math.floor(this.canvas.width / this.gridSize);
                this.gridHeight = Math.floor(this.canvas.height / this.gridSize);

                // 初始位置
                const startX = Math.floor(this.gridWidth / 2);
                const startY = Math.floor(this.gridHeight / 2);

                this.snake = new Snake(startX, startY);
                this.food = null;
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('snake_highscore')) || 0;
                this.state = GameState.PLAYING;
                this.gameSpeed = DIFFICULTIES.medium;
                this.baseGameSpeed = DIFFICULTIES.medium;
                this.activeKeys = new Set();
                this.lastTime = null; // 使用null表示尚未初始化
                this._lastScoreTimestamp = 0;
                this.history = [];
                this.reviveUsed = false;

                // 绑定输入处理
                this.bindInput();

                // 初始化食物
                this.spawnFood();

                // 延迟启动游戏循环，确保初始化完成
                this.gameLoop = this.gameLoop.bind(this);
                setTimeout(() => {
                    this.lastTime = performance.now();
                    requestAnimationFrame(this.gameLoop);
                }, 100);

                // 更新显示
                this.updateUI();
                this.lastMoveTime = Date.now();
            }

            // 调整画布大小
            resizeCanvas() {
                const maxWidth = Math.min(window.innerWidth - 40, 600);
                const maxHeight = Math.min(window.innerHeight - 300, 600);
                const size = Math.min(maxWidth, maxHeight);

                this.canvas.width = size;
                this.canvas.height = size;
            }

            // 生成食物
            spawnFood() {
                let newFood;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * this.gridWidth),
                        y: Math.floor(Math.random() * this.gridHeight)
                    };
                } while (this.isFoodOnSnake(newFood));
                this.food = newFood;
            }

            // 检查食物是否在蛇身上
            isFoodOnSnake(pos) {
                return this.snake.body.some(segment =>
                    segment.x === pos.x && segment.y === pos.y
                );
            }

            // 检查是否撞墙
            checkWallCollision() {
                const head = this.snake.getHead();
                return head.x < 0 || head.x >= this.gridWidth ||
                       head.y < 0 || head.y >= this.gridHeight;
            }

            // 游戏循环
            gameLoop(timestamp) {
                if (this.state === GameState.PLAYING) {
                    // 如果lastTime为null（第一次调用），设置它为当前时间
                    if (this.lastTime === null) {
                        this.lastTime = timestamp;
                    }

                    // 按住方向键时加速到5倍速度
                    const currentSpeed = this.activeKeys.size > 0 ? Math.floor(this.baseGameSpeed / 5) : this.gameSpeed;

                    // 只有当时间间隔达到要求时才更新
                    if (timestamp - this.lastTime >= currentSpeed) {
                        this.update();
                        this.lastTime = timestamp;
                    }
                } else {
                    // 如果不是游戏中状态，也更新lastTime
                    this.lastTime = timestamp;
                }
                this.render();
                requestAnimationFrame(this.gameLoop);
            }

            // 保存当前状态到历史（用于复活）
            saveState() {
                this.history.push({
                    body: this.snake.body.map(s => ({ ...s })),
                    direction: { ...this.snake.direction },
                    nextDirection: { ...this.snake.nextDirection },
                    food: { ...this.food },
                    score: this.score
                });
                // 最多保存 20 步历史
                if (this.history.length > 20) {
                    this.history.shift();
                }
            }

            // 更新游戏状态
            update() {
                // 在移动前保存状态（用于复活）
                this.saveState();

                this.snake.move();

                // 检查碰撞
                if (this.checkWallCollision() || this.snake.collidesWithSelf()) {
                    this.gameOver();
                    return;
                }

                // 检查是否吃到食物
                const head = this.snake.getHead();
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.snake.grow();
                    this.score += 10;
                    this.spawnFood();
                    this.updateUI();
                }
            }

            // 渲染
            render() {
                // 清空画布
                this.ctx.fillStyle = GAME_CONFIG.BACKGROUND_COLOR;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制网格
                this.drawGrid();

                // 绘制食物
                this.drawFood();

                // 绘制蛇
                this.drawSnake();
            }

            // 绘制网格
            drawGrid() {
                this.ctx.strokeStyle = GAME_CONFIG.GRID_COLOR;
                this.ctx.lineWidth = 1;

                for (let i = 0; i <= this.gridWidth; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.gridSize, 0);
                    this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                    this.ctx.stroke();
                }

                for (let i = 0; i <= this.gridHeight; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.gridSize);
                    this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                    this.ctx.stroke();
                }
            }

            // 绘制蛇
            drawSnake() {
                const padding = 2;
                const size = this.gridSize - padding * 2;

                this.snake.body.forEach((segment, index) => {
                    const x = segment.x * this.gridSize + padding;
                    const y = segment.y * this.gridSize + padding;

                    // 蛇头和蛇身颜色（加速时蛇头变红色）
                    const headColor = this.activeKeys.size > 0 ? '#ff4444' : GAME_CONFIG.SNAKE_COLOR;
                    this.ctx.fillStyle = index === 0 ? headColor : GAME_CONFIG.SNAKE_BODY_COLOR;

                    // 绘制圆角矩形
                    this.drawRoundedRect(x, y, size, size, 4);

                    // 添加阴影
                    this.ctx.shadowColor = GAME_CONFIG.SHADOW_COLOR;
                    this.ctx.shadowBlur = 4;
                    this.ctx.shadowOffsetX = 2;
                    this.ctx.shadowOffsetY = 2;
                });

                // 重置阴影
                this.ctx.shadowColor = 'transparent';
                this.ctx.shadowBlur = 0;
                this.ctx.shadowOffsetX = 0;
                this.ctx.shadowOffsetY = 0;
            }

            // 绘制食物
            drawFood() {
                const centerX = this.food.x * this.gridSize + this.gridSize / 2;
                const centerY = this.food.y * this.gridSize + this.gridSize / 2;
                const radius = this.gridSize / 2 - 3;

                this.ctx.fillStyle = GAME_CONFIG.FOOD_COLOR;
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                this.ctx.fill();

                // 添加发光效果
                this.ctx.shadowColor = GAME_CONFIG.FOOD_COLOR;
                this.ctx.shadowBlur = 10;
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                this.ctx.fill();

                // 重置阴影
                this.ctx.shadowColor = 'transparent';
                this.ctx.shadowBlur = 0;
            }

            // 绘制圆角矩形
            drawRoundedRect(x, y, width, height, radius) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + radius, y);
                this.ctx.lineTo(x + width - radius, y);
                this.ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.ctx.lineTo(x + width, y + height - radius);
                this.ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.ctx.lineTo(x + radius, y + height);
                this.ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.ctx.lineTo(x, y + radius);
                this.ctx.quadraticCurveTo(x, y, x + radius, y);
                this.ctx.closePath();
                this.ctx.fill();
            }

            // 绑定输入
            bindInput() {
                // 键盘输入
                document.addEventListener('keydown', (e) => {
                    if (this.state !== GameState.PLAYING) return;

                    // 检测方向键加速 + 方向控制
                    const directionKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
                    if (directionKeys.includes(e.key)) {
                        e.preventDefault();
                        // 按住方向键时加速到5倍速度
                        this.activeKeys.add(e.key);
                        this.gameSpeed = Math.floor(this.baseGameSpeed / 5);
                    }

                    switch (e.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            this.snake.setDirection(0, -1);
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            this.snake.setDirection(0, 1);
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            this.snake.setDirection(-1, 0);
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            this.snake.setDirection(1, 0);
                            break;
                        case ' ':
                        case 'Escape':
                            e.preventDefault();
                            if (!document.getElementById('leaderboard-menu').classList.contains('hidden')) {
                                this.closeLeaderboard();
                            } else {
                                this.togglePause();
                            }
                            break;
                    }
                });

                // 按键释放事件
                document.addEventListener('keyup', (e) => {
                    // 方向键释放时恢复原速度
                    const directionKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
                    if (directionKeys.includes(e.key)) {
                        this.activeKeys.delete(e.key);
                        if (this.activeKeys.size === 0) {
                            this.gameSpeed = this.baseGameSpeed;
                        } else {
                            // 还有其他方向键按住，继续加速
                            this.gameSpeed = Math.floor(this.baseGameSpeed / 5);
                        }
                    }
                });

                // 虚拟方向键（支持按住加速）
                const touchConfig = {
                    'btn-up': { key: 'touch-up', dx: 0, dy: -1 },
                    'btn-down': { key: 'touch-down', dx: 0, dy: 1 },
                    'btn-left': { key: 'touch-left', dx: -1, dy: 0 },
                    'btn-right': { key: 'touch-right', dx: 1, dy: 0 },
                };

                const handleTouchStart = (config) => (e) => {
                    e.preventDefault();
                    if (this.state !== GameState.PLAYING) return;
                    this.activeKeys.add(config.key);
                    this.gameSpeed = Math.floor(this.baseGameSpeed / 5);
                    this.snake.setDirection(config.dx, config.dy);
                };

                const handleTouchEnd = (config) => (e) => {
                    e.preventDefault();
                    this.activeKeys.delete(config.key);
                    if (this.activeKeys.size === 0) {
                        this.gameSpeed = this.baseGameSpeed;
                    } else {
                        this.gameSpeed = Math.floor(this.baseGameSpeed / 5);
                    }
                };

                Object.entries(touchConfig).forEach(([id, config]) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', handleTouchStart(config));
                    el.addEventListener('touchend', handleTouchEnd(config));
                    el.addEventListener('touchcancel', handleTouchEnd(config));
                });

                // 难度选择
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.baseGameSpeed = parseInt(btn.dataset.speed);
                        this.gameSpeed = this.baseGameSpeed;
                    });
                });

                // 暂停按钮
                document.getElementById('pause-btn').addEventListener('click', () => {
                    this.togglePause();
                });

                // 暂停菜单按钮
                document.getElementById('resume-btn').addEventListener('click', () => {
                    this.togglePause();
                });
                document.getElementById('restart-btn').addEventListener('click', () => {
                    this.restart();
                });

                // 游戏结束按钮
                document.getElementById('play-again-btn').addEventListener('click', () => {
                    this.restart();
                });

                // 窗口大小改变
                window.addEventListener('resize', () => {
                    this.resizeCanvas();
                    this.gridWidth = Math.floor(this.canvas.width / this.gridSize);
                    this.gridHeight = Math.floor(this.canvas.height / this.gridSize);
                });

                // 排行榜按钮
                document.getElementById('leaderboard-btn').addEventListener('click', () => {
                    this.openLeaderboard();
                });

                document.getElementById('leaderboard-close-btn').addEventListener('click', () => {
                    this.closeLeaderboard();
                });

                // 分享成绩按钮
                document.getElementById('share-score-btn').addEventListener('click', () => {
                    const text = `我在贪吃蛇游戏中得了 ${this.score} 分！来挑战吧 🐍`;
                    if (navigator.share) {
                        navigator.share({ title: '贪吃蛇游戏', text }).catch(() => {});
                    } else if (navigator.clipboard) {
                        navigator.clipboard.writeText(text).then(() => {
                            this.showToast('成绩已复制，快去分享吧！');
                        }).catch(() => {
                            this.fallbackCopy(text);
                        });
                    } else {
                        this.fallbackCopy(text);
                    }
                });

                // 复活按钮
                document.getElementById('revive-btn').addEventListener('click', () => {
                    this.revive();
                });
            }

            // 兼容的复制方式
            fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    this.showToast('成绩已复制，快去分享吧！');
                } catch {
                    this.showToast('复制失败，请手动分享截图');
                }
                document.body.removeChild(ta);
            }

            // 更新 UI
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('highscore').textContent = this.highScore;
            }

            // 获取当前难度文字
            getDifficultyName() {
                const speed = this.baseGameSpeed;
                if (speed === 600) return '慢速';
                if (speed === 400) return '中速';
                if (speed === 240) return '快速';
                return '中速';
            }

            // 加载排行榜
            loadLeaderboard() {
                try {
                    const data = localStorage.getItem('snake_leaderboard');
                    return data ? JSON.parse(data) : [];
                } catch {
                    return [];
                }
            }

            // 保存排行榜
            saveLeaderboard(scores) {
                localStorage.setItem('snake_leaderboard', JSON.stringify(scores));
            }

            // 添加分数到排行榜，返回是否新纪录
            addScoreToLeaderboard(score) {
                const scores = this.loadLeaderboard();
                const timestamp = Date.now();
                const entry = {
                    score,
                    date: new Date().toLocaleDateString('zh-CN'),
                    diff: this.getDifficultyName(),
                    timestamp
                };
                scores.push(entry);
                scores.sort((a, b) => b.score - a.score || a.timestamp - b.timestamp);
                if (scores.length > 10) scores.length = 10;
                this.saveLeaderboard(scores);
                this._lastScoreTimestamp = timestamp;
                // 判断是否进入排行榜
                const rank = scores.findIndex(s => s.timestamp === timestamp);
                return rank >= 0;
            }

            // 渲染排行榜
            renderLeaderboard() {
                const scores = this.loadLeaderboard();
                const container = document.getElementById('leaderboard-content');

                if (scores.length === 0) {
                    container.innerHTML = '<div class="no-scores">暂无记录</div>';
                    return;
                }

                let html = `<table class="leaderboard-table">
                    <thead><tr><th>#</th><th>分数</th><th>难度</th><th>日期</th></tr></thead><tbody>`;

                scores.forEach((entry, index) => {
                    const rankClass = index < 3 ? `rank-${index + 1}` : 'rank-other';
                    const rankLabel = index < 3 ? ['🥇', '🥈', '🥉'][index] : (index + 1);
                    const isCurrent = entry.timestamp === this._lastScoreTimestamp;
                    const rowClass = isCurrent ? 'current-score-row' : '';
                    html += `<tr class="${rowClass}">
                        <td><span class="rank-badge ${rankClass}">${rankLabel}</span></td>
                        <td>${entry.score}</td>
                        <td>${entry.diff}</td>
                        <td>${entry.date}</td>
                    </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            }

            // 打开排行榜
            openLeaderboard() {
                this.renderLeaderboard();
                document.getElementById('leaderboard-menu').classList.remove('hidden');
                this._previousState = this.state;
                if (this.state === GameState.PLAYING) {
                    this.state = GameState.PAUSED;
                }
            }

            // 关闭排行榜
            closeLeaderboard() {
                document.getElementById('leaderboard-menu').classList.add('hidden');
                if (this._previousState === GameState.PLAYING) {
                    this.state = GameState.PLAYING;
                }
            }

            // Toast 提示
            showToast(msg) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                clearTimeout(this._toastTimer);
                this._toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
            }

            // 切换暂停
            togglePause() {
                if (this.state === GameState.PLAYING) {
                    this.state = GameState.PAUSED;
                    document.getElementById('pause-menu').classList.remove('hidden');
                    document.getElementById('pause-btn').textContent = '继续';
                } else if (this.state === GameState.PAUSED) {
                    this.state = GameState.PLAYING;
                    document.getElementById('pause-menu').classList.add('hidden');
                    document.getElementById('pause-btn').textContent = '暂停';
                }
            }

            // 游戏结束
            gameOver() {
                this.state = GameState.GAMEOVER;

                // 更新最高分
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('snake_highscore', this.highScore);
                }

                // 添加到排行榜前先移除历史中的最后一条（死亡前保存的无效状态）
                this.history.pop();

                const isNewRecord = this.addScoreToLeaderboard(this.score);

                this.updateUI();

                // 显示游戏结束菜单
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('new-record').style.display = isNewRecord ? 'block' : 'none';
                // 如果未使用过复活且有足够历史，显示复活按钮
                const canRevive = !this.reviveUsed && this.history.length >= 3;
                document.getElementById('revive-btn').style.display = canRevive ? 'block' : 'none';
                document.getElementById('game-over-menu').classList.remove('hidden');
                document.getElementById('pause-btn').textContent = '重新开始';
            }

            // 复活：回到5步前的状态
            revive() {
                if (this.reviveUsed || this.history.length < 1) return;

                this.reviveUsed = true;

                // 回到5步前（或最早可用的状态）
                const stepsBack = Math.min(5, this.history.length);
                const state = this.history[this.history.length - stepsBack];

                // 恢复蛇的状态
                this.snake.body = state.body.map(s => ({ ...s }));
                this.snake.direction = { ...state.direction };
                this.snake.nextDirection = { ...state.nextDirection };
                this.snake.growing = false;

                // 恢复食物和分数
                this.food = { ...state.food };
                this.score = state.score;

                // 清除历史中这个时间点之后的所有记录
                this.history = this.history.slice(0, this.history.length - stepsBack + 1);

                // 恢复游戏状态
                this.state = GameState.PLAYING;
                this.lastTime = performance.now();
                this.gameSpeed = this.baseGameSpeed;

                // UI
                document.getElementById('game-over-menu').classList.add('hidden');
                document.getElementById('pause-btn').textContent = '暂停';
                this.updateUI();
            }

            // 重新开始
            restart() {
                const startX = Math.floor(this.gridWidth / 2);
                const startY = Math.floor(this.gridHeight / 2);

                this.snake.reset(startX, startY);
                this.score = 0;
                this.state = GameState.PLAYING;
                this.spawnFood();
                this.updateUI();
                this.activeKeys.clear();
                this.history = [];
                this.reviveUsed = false;
                this.lastMoveTime = Date.now();

                document.getElementById('game-over-menu').classList.add('hidden');
                document.getElementById('pause-menu').classList.add('hidden');
                document.getElementById('leaderboard-menu').classList.add('hidden');
                document.getElementById('pause-btn').textContent = '暂停';
            }
        }

        // 初始化游戏
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            new Game(canvas);
        });
    </script>
</body>
</html>
