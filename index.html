<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #ui-container {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .score-section {
            font-size: 18px;
        }

        .label {
            opacity: 0.8;
            margin-right: 5px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #4ade80;
            color: #1e3c72;
            font-weight: bold;
        }

        .pause-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #game-canvas {
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .mobile-controls {
            display: none;
            margin-top: 15px;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: #4ade80;
            transform: scale(0.95);
        }

        .menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 60, 114, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .menu.hidden {
            display: none;
        }

        .menu h2 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        .final-score {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px 30px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            background: #4ade80;
            color: #1e3c72;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: block;
            }

            .info-bar {
                font-size: 14px;
                gap: 15px;
            }

            .difficulty-selector {
                gap: 5px;
            }

            .difficulty-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="info-bar">
            <div class="score-section">
                <span class="label">分数:</span>
                <span id="score">0</span>
            </div>
            <div class="score-section">
                <span class="label">最高分:</span>
                <span id="highscore">0</span>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn" data-speed="600">慢速</button>
            <button class="difficulty-btn active" data-speed="400">中速</button>
            <button class="difficulty-btn" data-speed="240">快速</button>
        </div>

        <button id="pause-btn" class="pause-btn">暂停</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="mobile-controls" class="mobile-controls">
        <div class="control-row">
            <button class="control-btn" id="btn-up">↑</button>
        </div>
        <div class="control-row">
            <button class="control-btn" id="btn-left">←</button>
            <button class="control-btn" id="btn-down">↓</button>
            <button class="control-btn" id="btn-right">→</button>
        </div>
    </div>

    <div id="pause-menu" class="menu hidden">
        <h2>游戏暂停</h2>
        <button id="resume-btn" class="menu-btn">继续游戏</button>
        <button id="restart-btn" class="menu-btn">重新开始</button>
    </div>

    <div id="game-over-menu" class="menu hidden">
        <h2>游戏结束</h2>
        <p class="final-score">最终得分: <span id="final-score">0</span></p>
        <button id="play-again-btn" class="menu-btn">再玩一次</button>
    </div>

    <script>
        // 游戏常量
        const GAME_CONFIG = {
            GRID_SIZE: 20,
            SNAKE_COLOR: '#4ade80',
            SNAKE_BODY_COLOR: '#22c55e',
            FOOD_COLOR: '#f97316',
            BACKGROUND_COLOR: '#1e3c72',
            GRID_COLOR: 'rgba(255, 255, 255, 0.05)',
            SHADOW_COLOR: 'rgba(0, 0, 0, 0.3)'
        };

        // 游戏状态枚举
        const GameState = {
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover'
        };

        // 难度配置
        const DIFFICULTIES = {
            slow: 150,
            medium: 100,
            fast: 60
        };

        // Snake 类 - 管理蛇的状态和移动
        class Snake {
            constructor(startX, startY) {
                this.body = [
                    { x: startX, y: startY },
                    { x: startX - 1, y: startY },
                    { x: startX - 2, y: startY }
                ];
                this.direction = { x: 1, y: 0 }; // 初始向右移动
                this.nextDirection = { x: 1, y: 0 };
                this.growing = false;
            }

            // 设置方向（防止直接掉头）
            setDirection(x, y) {
                // 防止直接掉头
                if (this.direction.x === -x && this.direction.y === -y) {
                    return;
                }
                this.nextDirection = { x, y };
            }

            // 移动蛇
            move() {
                this.direction = { ...this.nextDirection };

                const head = this.getHead();
                const newHead = {
                    x: head.x + this.direction.x,
                    y: head.y + this.direction.y
                };

                this.body.unshift(newHead);

                if (!this.growing) {
                    this.body.pop();
                } else {
                    this.growing = false;
                }
            }

            // 获取蛇头
            getHead() {
                return this.body[0];
            }

            // 检查是否撞到自己
            collidesWithSelf() {
                const head = this.getHead();
                return this.body.slice(1).some(segment =>
                    segment.x === head.x && segment.y === head.y
                );
            }

            // 生长
            grow() {
                this.growing = true;
            }

            // 重置
            reset(startX, startY) {
                this.body = [
                    { x: startX, y: startY },
                    { x: startX - 1, y: startY },
                    { x: startX - 2, y: startY }
                ];
                this.direction = { x: 1, y: 0 };
                this.nextDirection = { x: 1, y: 0 };
                this.growing = false;
            }
        }

        // Game 类 - 管理游戏循环和状态
        class Game {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.gridSize = GAME_CONFIG.GRID_SIZE;

                // 计算网格数量
                this.resizeCanvas();
                this.gridWidth = Math.floor(this.canvas.width / this.gridSize);
                this.gridHeight = Math.floor(this.canvas.height / this.gridSize);

                // 初始位置
                const startX = Math.floor(this.gridWidth / 2);
                const startY = Math.floor(this.gridHeight / 2);

                this.snake = new Snake(startX, startY);
                this.food = null;
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('snake_highscore')) || 0;
                this.state = GameState.PLAYING;
                this.gameSpeed = DIFFICULTIES.medium;
                this.baseGameSpeed = DIFFICULTIES.medium;
                this.activeDirections = new Set();
                this.lastTime = 0;

                // 绑定输入处理
                this.bindInput();

                // 初始化食物
                this.spawnFood();

                // 开始游戏循环
                this.gameLoop = this.gameLoop.bind(this);
                requestAnimationFrame(this.gameLoop);

                // 更新显示
                this.updateUI();
            }

            // 调整画布大小
            resizeCanvas() {
                const maxWidth = Math.min(window.innerWidth - 40, 600);
                const maxHeight = Math.min(window.innerHeight - 300, 600);
                const size = Math.min(maxWidth, maxHeight);

                this.canvas.width = size;
                this.canvas.height = size;
            }

            // 生成食物
            spawnFood() {
                let newFood;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * this.gridWidth),
                        y: Math.floor(Math.random() * this.gridHeight)
                    };
                } while (this.isFoodOnSnake(newFood));
                this.food = newFood;
            }

            // 检查食物是否在蛇身上
            isFoodOnSnake(pos) {
                return this.snake.body.some(segment =>
                    segment.x === pos.x && segment.y === pos.y
                );
            }

            // 检查是否撞墙
            checkWallCollision() {
                const head = this.snake.getHead();
                return head.x < 0 || head.x >= this.gridWidth ||
                       head.y < 0 || head.y >= this.gridHeight;
            }

            // 游戏循环
            gameLoop(timestamp) {
                if (this.state === GameState.PLAYING) {
                    if (timestamp - this.lastTime >= this.gameSpeed) {
                        this.update();
                        this.lastTime = timestamp;
                    }
                }
                this.render();
                requestAnimationFrame(this.gameLoop);
            }

            // 更新游戏状态
            update() {
                this.snake.move();

                // 检查碰撞
                if (this.checkWallCollision() || this.snake.collidesWithSelf()) {
                    this.gameOver();
                    return;
                }

                // 检查是否吃到食物
                const head = this.snake.getHead();
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.snake.grow();
                    this.score += 10;
                    this.spawnFood();
                    this.updateUI();
                }
            }

            // 渲染
            render() {
                // 清空画布
                this.ctx.fillStyle = GAME_CONFIG.BACKGROUND_COLOR;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制网格
                this.drawGrid();

                // 绘制食物
                this.drawFood();

                // 绘制蛇
                this.drawSnake();
            }

            // 绘制网格
            drawGrid() {
                this.ctx.strokeStyle = GAME_CONFIG.GRID_COLOR;
                this.ctx.lineWidth = 1;

                for (let i = 0; i <= this.gridWidth; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.gridSize, 0);
                    this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                    this.ctx.stroke();
                }

                for (let i = 0; i <= this.gridHeight; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.gridSize);
                    this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                    this.ctx.stroke();
                }
            }

            // 绘制蛇
            drawSnake() {
                const padding = 2;
                const size = this.gridSize - padding * 2;

                this.snake.body.forEach((segment, index) => {
                    const x = segment.x * this.gridSize + padding;
                    const y = segment.y * this.gridSize + padding;

                    // 蛇头和蛇身颜色
                    this.ctx.fillStyle = index === 0 ? GAME_CONFIG.SNAKE_COLOR : GAME_CONFIG.SNAKE_BODY_COLOR;

                    // 绘制圆角矩形
                    this.drawRoundedRect(x, y, size, size, 4);

                    // 添加阴影
                    this.ctx.shadowColor = GAME_CONFIG.SHADOW_COLOR;
                    this.ctx.shadowBlur = 4;
                    this.ctx.shadowOffsetX = 2;
                    this.ctx.shadowOffsetY = 2;
                });

                // 重置阴影
                this.ctx.shadowColor = 'transparent';
                this.ctx.shadowBlur = 0;
                this.ctx.shadowOffsetX = 0;
                this.ctx.shadowOffsetY = 0;
            }

            // 绘制食物
            drawFood() {
                const centerX = this.food.x * this.gridSize + this.gridSize / 2;
                const centerY = this.food.y * this.gridSize + this.gridSize / 2;
                const radius = this.gridSize / 2 - 3;

                this.ctx.fillStyle = GAME_CONFIG.FOOD_COLOR;
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                this.ctx.fill();

                // 添加发光效果
                this.ctx.shadowColor = GAME_CONFIG.FOOD_COLOR;
                this.ctx.shadowBlur = 10;
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                this.ctx.fill();

                // 重置阴影
                this.ctx.shadowColor = 'transparent';
                this.ctx.shadowBlur = 0;
            }

            // 绘制圆角矩形
            drawRoundedRect(x, y, width, height, radius) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + radius, y);
                this.ctx.lineTo(x + width - radius, y);
                this.ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.ctx.lineTo(x + width, y + height - radius);
                this.ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.ctx.lineTo(x + radius, y + height);
                this.ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.ctx.lineTo(x, y + radius);
                this.ctx.quadraticCurveTo(x, y, x + radius, y);
                this.ctx.closePath();
                this.ctx.fill();
            }

            // 绑定输入
            bindInput() {
                // 键盘输入
                document.addEventListener('keydown', (e) => {
                    if (this.state !== GameState.PLAYING) return;

                    // 检测方向键加速
                    const directionKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
                    if (directionKeys.includes(e.key)) {
                        this.activeDirections.add(e.key);
                        // 如果按住方向键超过2个不同的键，或者按住同一个键超过一定时间，启用加速
                        if (this.activeDirections.size >= 1) {
                            // 按住方向键时加速
                            this.gameSpeed = this.baseGameSpeed / 2;
                        }
                        return;
                    }

                    switch (e.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            e.preventDefault();
                            this.snake.setDirection(0, -1);
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            e.preventDefault();
                            this.snake.setDirection(0, 1);
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            e.preventDefault();
                            this.snake.setDirection(-1, 0);
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            e.preventDefault();
                            this.snake.setDirection(1, 0);
                            break;
                        case ' ':
                        case 'Escape':
                            e.preventDefault();
                            this.togglePause();
                            break;
                    }
                });

                // 按键释放事件
                document.addEventListener('keyup', (e) => {
                    // 方向键释放时恢复原速度
                    const directionKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
                    if (directionKeys.includes(e.key)) {
                        this.activeDirections.delete(e.key);
                        // 如果没有方向键被按住，恢复原速度
                        if (this.activeDirections.size === 0) {
                            this.gameSpeed = this.baseGameSpeed;
                        }
                    }
                });

                // 虚拟方向键
                document.getElementById('btn-up').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.state === GameState.PLAYING) this.snake.setDirection(0, -1);
                });
                document.getElementById('btn-down').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.state === GameState.PLAYING) this.snake.setDirection(0, 1);
                });
                document.getElementById('btn-left').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.state === GameState.PLAYING) this.snake.setDirection(-1, 0);
                });
                document.getElementById('btn-right').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.state === GameState.PLAYING) this.snake.setDirection(1, 0);
                });

                // 难度选择
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.gameSpeed = parseInt(btn.dataset.speed);
                    });
                });

                // 暂停按钮
                document.getElementById('pause-btn').addEventListener('click', () => {
                    this.togglePause();
                });

                // 暂停菜单按钮
                document.getElementById('resume-btn').addEventListener('click', () => {
                    this.togglePause();
                });
                document.getElementById('restart-btn').addEventListener('click', () => {
                    this.restart();
                });

                // 游戏结束按钮
                document.getElementById('play-again-btn').addEventListener('click', () => {
                    this.restart();
                });

                // 窗口大小改变
                window.addEventListener('resize', () => {
                    this.resizeCanvas();
                    this.gridWidth = Math.floor(this.canvas.width / this.gridSize);
                    this.gridHeight = Math.floor(this.canvas.height / this.gridSize);
                });
            }

            // 更新 UI
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('highscore').textContent = this.highScore;
            }

            // 切换暂停
            togglePause() {
                if (this.state === GameState.PLAYING) {
                    this.state = GameState.PAUSED;
                    document.getElementById('pause-menu').classList.remove('hidden');
                    document.getElementById('pause-btn').textContent = '继续';
                } else if (this.state === GameState.PAUSED) {
                    this.state = GameState.PLAYING;
                    document.getElementById('pause-menu').classList.add('hidden');
                    document.getElementById('pause-btn').textContent = '暂停';
                }
            }

            // 游戏结束
            gameOver() {
                this.state = GameState.GAMEOVER;

                // 更新最高分
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('snake_highscore', this.highScore);
                }
                this.updateUI();

                // 显示游戏结束菜单
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('game-over-menu').classList.remove('hidden');
                document.getElementById('pause-btn').textContent = '重新开始';
            }

            // 重新开始
            restart() {
                const startX = Math.floor(this.gridWidth / 2);
                const startY = Math.floor(this.gridHeight / 2);

                this.snake.reset(startX, startY);
                this.score = 0;
                this.state = GameState.PLAYING;
                this.spawnFood();
                this.updateUI();

                document.getElementById('game-over-menu').classList.add('hidden');
                document.getElementById('pause-menu').classList.add('hidden');
                document.getElementById('pause-btn').textContent = '暂停';
            }
        }

        // 初始化游戏
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            new Game(canvas);
        });
    </script>
</body>
</html>
